<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Soul Made Cafe</title>
<style>
:root{--cream:#FAF7F2;--espresso:#2C1A0E;--latte:#C8A882;--foam:#F0E8DC;--sage:#7A8C6E;--rust:#B85C38;--star:#E8B84B;--radius:16px;--shadow:0 4px 24px rgba(44,26,14,.1)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--cream);color:var(--espresso);min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px 16px}
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);width:100%;max-width:420px;padding:36px 28px 32px;text-align:center;animation:fadeUp .35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.logo{font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--latte);margin-bottom:20py}
h1{font-size:22px;font-weight:700;line-height:1.35;margin-bottom:8px}
.sub{font-size:14px;color:#7a6a5a;line-height:1.6;margin-bottom:28px}
.stars-wrap{display:flex;justify-content:center;gap:10px;margin-bottom:10px}
.star-btn{font-size:44px;cursor:pointer;color:#ddd;background:none;border:none;padding:0;line-height:1;transition:color .15s,transform .15s;-webkit-tap-highlight-color:transparent}
.star-btn.lit{color:var(--star)}
.star-btn:active{transform:scale(1.2)}
.star-lbl{font-size:13px;color:#a09080;min-height:20px;margin-bottom:24px}
.kw-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:8px}
.kw-chip{padding:8px 14px;border-radius:50px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--latte);background:transparent;color:var(--espresso);transition:all .15s;-webkit-tap-highlight-color:transparent;line-height:1.3}
.kw-chip.sel{background:var(--espresso);color:#fff;border-color:var(--espresso)}
.kw-hint{font-size:12px;color:#a09080;margin-bottom:20px}
.btn{display:block;width:100%;padding:15px;border-radius:50px;font-size:15px;font-weight:600;cursor:pointer;border:none;transition:opacity .2s,transform .15s;text-decoration:none;margin-bottom:10px}
.btn:active{transform:scale(.97)}
.btn-dark{background:var(--espresso);color:#fff}
.btn-google{background:#4285F4;color:#fff}
.btn-sage{background:var(--sage);color:#fff}
.btn-lock{background:#e0d8d0;color:#aaa;cursor:not-allowed;pointer-events:none}
.rv-box{background:var(--foam);border-radius:12px;padding:16px 14px;text-align:left;font-size:13px;line-height:1.7;color:#4a3828;margin-bottom:16px;position:relative;border:1px solid #e8ddd0;font-style:italic}
.cp-tag{position:absolute;top:10px;right:10px;font-size:11px;background:var(--latte);color:#fff;padding:3px 9px;border-radius:20px;cursor:pointer;font-weight:600;transition:background .2s}
.cp-tag.done{background:var(--sage)}
.hint{font-size:12px;color:#a09080;margin-bottom:16px;line-height:1.5}
.cd-wrap{margin-bottom:14px}
.cd-bg{height:4px;background:#e8ddd0;border-radius:4px;overflow:hidden;margin-bottom:8px}
.cd-bar{height:4px;background:var(--sage);border-radius:4px;transition:width 1s linear}
.cd-txt{font-size:12px;color:#a09080}
textarea{width:100%;border:1.5px solid var(--foam);border-radius:12px;padding:14px;font-size:14px;font-family:inherit;color:var(--espresso);background:var(--foam);resize:none;outline:none;min-height:120px;margin-bottom:18px;line-height:1.6;transition:border-color .2s}
textarea:focus{border-color:var(--latte)}
textarea::placeholder{color:#b0a090}
.rdm-wrap{background:var(--foam);border-radius:14px;padding:20px 16px;margin-bottom:18px}
.rdm-emoji{font-size:42px;margin-bottom:8px}
.rdm-title{font-size:18px;font-weight:700;margin-bottom:4px}
.rdm-sub{font-size:13px;color:#7a6a5a;margin-bottom:12px}
.rdm-rv{background:#fff;border-radius:10px;padding:12px 14px;font-size:12px;font-style:italic;color:#4a3828;line-height:1.6;text-align:left;border:1px solid #e8ddd0;margin-bottom:12px}
.rdm-badge{display:inline-block;background:var(--star);color:var(--espresso);font-weight:700;font-size:13px;padding:5px 14px;border-radius:20px;letter-spacing:.04em}
.expire-row{font-size:11px;color:#a09080;margin-top:10px}
.expire-live{font-weight:700;color:var(--sage)}
.expire-live.urgent{color:var(--rust)}
.staff-note{font-size:11px;color:#a09080;margin-top:12px;line-height:1.5}
.chip-score{display:inline-flex;align-items:center;gap:4px;background:var(--star);color:var(--espresso);font-weight:700;font-size:13px;padding:5px 12px;border-radius:20px;margin-bottom:18px}
.screen{display:none}
.screen.active{display:block}
.back{font-size:12px;color:var(--latte);cursor:pointer;margin-top:14px;display:inline-block}
.expire-box{padding:20px;text-align:center}
.expire-box h2{font-size:18px;margin-bottom:8px;color:var(--rust)}
.expire-box p{font-size:13px;color:#7a6a5a;line-height:1.6}
</style>
</head>
<body>
<div class="card">

<!-- S1: Star rating -->
<div id="s1" class="screen active">
  <div class="logo">Soul Made Cafe &middot; Spadina</div>
  <h1 id="t-s1h"></h1>
  <p class="sub" id="t-s1p"></p>
  <div class="stars-wrap" id="starRow">
    <button class="star-btn" data-val="1">&#9733;</button>
    <button class="star-btn" data-val="2">&#9733;</button>
    <button class="star-btn" data-val="3">&#9733;</button>
    <button class="star-btn" data-val="4">&#9733;</button>
    <button class="star-btn" data-val="5">&#9733;</button>
  </div>
  <div class="star-lbl" id="sLbl"></div>
  <button class="btn btn-dark" id="btnOK" style="display:none" onclick="onConfirm()"></button>
</div>

<!-- S2: Keyword picker -->
<div id="s2" class="screen">
  <div class="logo">Soul Made Cafe &middot; Spadina</div>
  <div class="chip-score">&#x2B50; 5 / 5</div>
  <h1 id="t-s2h"></h1>
  <p class="kw-hint" id="t-s2p"></p>
  <div class="kw-grid" id="kwGrid"></div>
  <button class="btn btn-dark" id="btnGen" onclick="genReview()" style="opacity:.5"></button>
  <br><span class="back" onclick="goBack()"></span>
</div>

<!-- S3: Review + Google + countdown -->
<div id="s3" class="screen">
  <div class="logo">Soul Made Cafe &middot; Spadina</div>
  <div class="chip-score">&#x2B50; 5 / 5</div>
  <h1 id="t-s3h"></h1>
  <p class="sub" id="t-s3p"></p>
  <div class="rv-box" id="rBox">
    <span class="cp-tag" id="cpTag" onclick="cpRv()"></span>
    <span id="rvTxt"></span>
  </div>
  <p class="hint" id="t-s3hint"></p>
  <button class="btn btn-google" id="gBtn" onclick="onGoogle()"></button>
  <div class="cd-wrap" id="cdWrap" style="display:none">
    <div class="cd-bg"><div class="cd-bar" id="cdBar" style="width:100%"></div></div>
    <div class="cd-txt" id="cdTxt"></div>
  </div>
  <br><span class="back" onclick="goBack()"></span>
</div>

<!-- S4: Sad feedback -->
<div id="s4" class="screen">
  <div class="logo">Soul Made Cafe &middot; Spadina</div>
  <div class="chip-score" id="sdChip"></div>
  <h1 id="t-s4h"></h1>
  <p class="sub" id="t-s4p"></p>
  <textarea id="fbTxt"></textarea>
  <button class="btn btn-dark" onclick="subFb()"></button>
  <br><span class="back" onclick="goBack()"></span>
</div>

<!-- S5: Redemption -->
<div id="s5" class="screen">
  <div class="logo">Soul Made Cafe &middot; Spadina</div>
  <div id="rdmBody"></div>
  <button class="btn btn-sage" id="stfBtn" onclick="stfRdm()"></button>
  <p class="staff-note" id="stfNote"></p>
</div>

</div>

var kwGrid = document.getElementById('kwGrid');
KW.forEach(function(k) {
  var b = document.createElement('button');
  b.className = 'kw-chip'; b.innerHTML = k.lbl; b.setAttribute('data-id', k.id);
  b.addEventListener('click', function() {
    if (b.classList.contains('sel')) {
      b.classList.remove('sel');
      selKw = selKw.filter(function(x) { return x !== k.id; });
    } else {
      if (selKw.length >= 3) return;
      b.classList.add('sel'); selKw.push(k.id);
    }
    document.getElementById('btnGen').style.opacity = selKw.length ? '1' : '0.5';
  });
  kwGrid.appendChild(b);
});

/* ── Stars ── */
var starBtns = document.querySelectorAll('.star-btn');
var sLbl = document.getElementById('sLbl');

starBtns.forEach(function(b) {
  b.addEventListener('click', function() {
    rating = parseInt(b.getAttribute('data-val'));
    pst(rating); sLbl.textContent = T.starLabels[rating]; btnOK.style.display = 'block';
  });
  b.addEventListener('mouseenter', function() { pst(parseInt(b.getAttribute('data-val'))); });
  b.addEventListener('mouseleave', function() { pst(rating); });
});

function pst(n) {
  starBtns.forEach(function(b) { b.classList.toggle('lit', parseInt(b.getAttribute('data-val')) <= n); });
}

function onConfirm() {
  if (!rating) return;
  if (rating === 5) {
    selKw = [];
    document.querySelectorAll('.kw-chip').forEach(function(c) { c.classList.remove('sel'); });
    document.getElementById('btnGen').style.opacity = '0.5';
    go('s2');
  } else {
    document.getElementById('sdChip').textContent = '\u2b50 ' + rating + ' / 5';
    document.getElementById('fbTxt').value = '';
    go('s4');
  }
}

  var picks = selKw.map(function(id) {
    var found = KW.filter(function(k) { return k.id === id; })[0];
    return found ? found.rv : id;
  });
  var tpls = TPLS[lang] || TPLS.en;
  var tpl = tpls[Math.floor(Math.random() * tpls.length)];
  curRv = tpl.replace('{A}', picks[0]).replace('{B}', picks[1] || picks[0]).replace('{C}', picks[2] || picks[0]);

  document.getElementById('rvTxt').textContent = curRv;

/* ── Copy ── */
function cpRv() {
  if (!curRv) return;
  function ok() {
    var t = document.getElementById('cpTag');
    t.textContent = T.cpDone; t.classList.add('done');
  }
  if (navigator.clipboard) { navigator.clipboard.writeText(curRv).then(ok); }
  else {
    var el = document.createElement('textarea');
    el.value = curRv; document.body.appendChild(el); el.select();
    document.execCommand('copy'); document.body.removeChild(el); ok();
  }
}

/* ── Google + countdown ── */
function onGoogle() {
  window.open(GU, '_blank');
  if (googleOpened) return;
  googleOpened = true;

  var gb = document.getElementById('gBtn');
  gb.textContent = T.s3gDone;
  gb.style.opacity = '0.55'; gb.style.pointerEvents = 'none';

  cdLeft = CD_SECS;
  document.getElementById('cdWrap').style.display = 'block';
  updCD();

  cdTimer = setInterval(function() {
    cdLeft--;
    updCD();
    if (cdLeft <= 0) {
      clearInterval(cdTimer);
      voucherToken = Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
      voucherStart = Date.now();
      showRdm5();
    }
  }, 1000);
}

function updCD() {
  document.getElementById('cdBar').style.width = (cdLeft / CD_SECS * 100) + '%';
  document.getElementById('cdTxt').textContent = T.s3cdTpl.replace('{s}', cdLeft);
}

    '<div class="rdm-title">' + T.rdmSadTitle + '</div>' +
    '<div class="rdm-sub">' + T.rdmSadSub + '</div>' +
    '<div class="rdm-badge">' + T.rdmBadge + '</div>' +
    '<div class="expire-row">' + T.expireLabel + hhmm + ' &nbsp;<span class="expire-live" id="expLive"></span></div></div>';
  document.getElementById('stfBtn').textContent = T.stfBtn;
  document.getElementById('stfBtn').className = 'btn btn-sage';
  document.getElementById('stfBtn').style.pointerEvents = '';
  document.getElementById('stfNote').textContent = T.stfNote;
  go('s5'); startExpire(key);
}

function startExpire(key) {
  clearInterval(expireTimer);
  expireTimer = setInterval(function() {
    var left = Math.floor((voucherStart + EXPIRE_SECS * 1000 - Date.now()) / 1000);
    var el = document.getElementById('expLive');
    if (!el) { clearInterval(expireTimer); return; }
    if (left <= 0) { clearInterval(expireTimer); showExpired(); return; }
    var m = Math.floor(left / 60), s = left % 60;
    el.textContent = T.expireLive.replace('{m}', m).replace('{s}', s.toString().padStart(2,'0'));
    el.className = 'expire-live' + (left < 120 ? ' urgent' : '');
  }, 1000);
}

function showExpired() {
  document.getElementById('rdmBody').innerHTML = '<div class="expire-box"><h2>&#x23F0; ' + T.expiredTitle + '</h2><p>' + T.expiredBody + '</p></div>';
  document.getElementById('stfBtn').className = 'btn btn-lock';
  document.getElementById('stfBtn').textContent = T.expiredTitle;
  document.getElementById('stfNote').textContent = '';
}

function showUsed() {
  document.getElementById('rdmBody').innerHTML = '<div class="expire-box"><h2>&#x2714;&#xFE0F; ' + T.usedTitle + '</h2><p>' + T.usedBody + '</p></div>';
  document.getElementById('stfBtn').className = 'btn btn-lock';
  document.getElementById('stfBtn').textContent = T.usedTitle;
  document.getElementById('stfNote').textContent = '';
  go('s5');
}

function stfRdm() {
  if (!voucherToken) return;
  localStorage.setItem('sm_used_' + voucherToken, '1');
  clearInterval(expireTimer);
  document.getElementById('rdmBody').innerHTML = '<div class="rdm-wrap"><div class="rdm-emoji">&#x2705;</div><div class="rdm-title">' + T.usedTitle + '</div><div class="rdm-sub">' + T.usedBody + '</div></div>';
  document.getElementById('stfBtn').className = 'btn btn-lock';
  document.getElementById('stfBtn').textContent = T.stfBtnDone;
  document.getElementById('stfNote').textContent = '';
}

function go(id) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function goBack() {
  clearInterval(cdTimer); clearInterval(expireTimer);
  googleOpened = false; rating = 0; pst(0);
  sLbl.textContent = T.s1lbl;
  btnOK.style.display = 'none';
  go('s1');
}
</script>
</body>
</html>
